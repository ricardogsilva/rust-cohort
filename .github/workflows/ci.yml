name: Continuous Integrationon

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  run_ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Format code
        run: cd rust-json-parser && cargo fmt --check

      - name: Lint code
        run: cd rust-json-parser && cargo clippy

      - name: Build
        run: cd rust-json-parser && cargo build --verbose

      - name: Run tests
        run: cd rust-json-parser && cargo test --verbose
