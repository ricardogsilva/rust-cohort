name: Continuous Integration

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  run_ci:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Format code
      run: cargo fmt
    - name: Lint code
      run: cargo clippy
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
